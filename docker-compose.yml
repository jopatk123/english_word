services:
  english-word:
    build: .
    image: english_word-english-word:latest
    container_name: english-word-app
    ports:
      - "3010:3010"
    volumes:
      - english-word-db:/app/data
    environment:
      - PORT=3010
      - DB_PATH=/app/data/words.db
      - JWT_SECRET=${JWT_SECRET}
    restart: always

volumes:
  english-word-db:
    driver: local