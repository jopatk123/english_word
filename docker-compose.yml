services:
  english-word:
    build: .
    image: english_word-english-word:latest
    container_name: english-word-app
    ports:
      - '${PORT:?PORT is required}:${PORT:?PORT is required}'
    volumes:
      - english-word-db:/app/data
    environment:
      PORT: ${PORT:?PORT is required}
      DB_PATH: ${DB_PATH:?DB_PATH is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AI_SETTINGS_SECRET: ${AI_SETTINGS_SECRET:?AI_SETTINGS_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
    restart: always

volumes:
  english-word-db:
    driver: local
